{{- if .Values.database.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "dclaw-agent.fullname" . }}-db
  labels:
    {{- include "dclaw-agent.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.database.instances }}
  storage:
    size: {{ .Values.database.storage }}
  resources:
    {{- toYaml .Values.database.resources | nindent 4 }}
  bootstrap:
    initdb:
      database: dclaw_{{ .Chart.Name }}
      owner: postgres
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
{{- end }}
